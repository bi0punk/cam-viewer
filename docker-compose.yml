version: "3.9"

# =============================================================
# Docker Compose — IP Camera Recorder + Web UI
# =============================================================
# Servicios:
#   recorder   → graba las cámaras en segmentos de 1 hora
#   web        → interfaz web (live + grabaciones) en puerto 8080
#
# Uso:
#   docker compose up -d --build    → construir e iniciar
#   docker compose logs -f recorder → logs del grabador
#   docker compose logs -f web      → logs de la web
#   docker compose down             → detener
#   docker compose restart web      → reiniciar solo la web
# =============================================================

services:

  # ── Grabador de cámaras ──────────────────────────────────
  recorder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cam_recorder
    restart: unless-stopped
    command: python -u recorder.py
    environment:
      - CONFIG_PATH=/config/cameras.yaml
      - TZ=America/Santiago
    volumes:
      - ./config:/config:ro
      - recordings_data:/recordings
      - ./logs:/logs
    network_mode: host
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "pgrep", "-f", "recorder.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── Interfaz Web ─────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cam_web
    restart: unless-stopped
    # Gunicorn con workers en threads para manejar múltiples streams
    command: >
      gunicorn
      --bind 0.0.0.0:8080
      --workers 1
      --threads 32
      --timeout 120
      --worker-class gthread
      --access-logfile -
      --error-logfile -
      web.app:app
    environment:
      - CONFIG_PATH=/config/cameras.yaml
      - RECORDINGS_DIR=/recordings
      - WEB_PORT=8080
      - LOG_LEVEL=INFO
      - TZ=America/Santiago
    volumes:
      - ./config:/config:ro
      - recordings_data:/recordings:ro
    ports:
      - "8080:8080"
    # Necesita acceso a la misma red que el grabador para RTSP
    network_mode: host
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

# =============================================================
# Volumen compartido entre recorder y web
# =============================================================
volumes:
  recordings_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./recordings

# =============================================================
# NOTAS
# =============================================================
#
# Interfaz web disponible en:  http://localhost:8080
#
# Para acceder desde otro equipo en la red:
#   http://<IP_DEL_SERVIDOR>:8080
#
# Las grabaciones quedan en ./recordings/<nombre_camara>/
# y son accesibles desde la interfaz web.
#
# Para probar una cámara sin grabar:
#   docker exec -it cam_recorder \
#     python test_camera.py rtsp://admin:pass@192.168.1.100:554/stream1
#
