version: "3.9"

services:
  recorder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cam_recorder
    restart: unless-stopped
    init: true
    command: python -u recorder.py
    environment:
      CONFIG_PATH: /config/cameras.yaml
      TZ: America/Santiago
    volumes:
      - ./config:/config:ro
      - ./recordings:/recordings
      - ./logs:/logs
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "pgrep", "-f", "recorder.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cam_web
    restart: unless-stopped
    init: true
    command: >
      gunicorn
      --bind 0.0.0.0:8080
      --workers 1
      --threads 16
      --timeout 120
      --worker-class gthread
      --access-logfile -
      --error-logfile -
      web.app:app
    environment:
      CONFIG_PATH: /config/cameras.yaml
      RECORDINGS_DIR: /recordings
      WEB_PORT: 8080
      LOG_LEVEL: INFO
      TZ: America/Santiago
      LIVE_MAX_WIDTH: 1280
      LIVE_JPEG_QUALITY: 80
      LIVE_IDLE_SECONDS: 30
      RECORDINGS_CACHE_TTL: 10
    volumes:
      - ./config:/config:ro
      - ./recordings:/recordings:ro
    ports:
      - "8080:8080"
    depends_on:
      - recorder
    stop_grace_period: 20s
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
