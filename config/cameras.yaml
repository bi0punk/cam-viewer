# =============================================================
# Configuración de Cámaras IP
# =============================================================
# Cada cámara puede tener los siguientes parámetros:
#
#  name        : Nombre identificador (sin espacios)
#  url         : URL RTSP o HTTP de la cámara
#  enabled     : true/false para activar o desactivar la grabación
#  split       : true/false — divide la imagen a la mitad verticalmente
#                (útil para cámaras de doble lente con una sola transmisión)
#  split_names : [nombre_izquierda, nombre_derecha] — nombres para cada mitad
#  fps         : Fotogramas por segundo (default: 15)
#  width       : Ancho de captura (0 = automático)
#  height      : Alto de captura (0 = automático)
# =============================================================

cameras:

  # -- Ejemplo: cámara simple --
  - name: "cam_entrada"
    url: "rtsp://admin:password@192.168.1.100:554/stream1"
    enabled: true
    split: false
    fps: 15
    width: 1920
    height: 1080

  # -- Ejemplo: cámara de doble lente (split vertical al 50%) --
  - name: "cam_doble_parking"
    url: "rtsp://admin:password@192.168.1.101:554/stream1"
    enabled: true
    split: true
    split_names:
      - "cam_parking_izquierda"
      - "cam_parking_derecha"
    fps: 15
    width: 0      # 0 = detectar automáticamente
    height: 0

  # -- Ejemplo: cámara desactivada --
  - name: "cam_bodega"
    url: "rtsp://admin:password@192.168.1.102:554/stream1"
    enabled: false
    split: false
    fps: 10
    width: 1280
    height: 720

# =============================================================
# Configuración Global de Grabación
# =============================================================
recording:
  segment_duration_minutes: 60      # Duración de cada segmento (1 hora)
  output_dir: "/recordings"         # Directorio de salida dentro del contenedor
  video_format: "mp4"               # Formato del video (mp4, mkv, avi)
  codec: "mp4v"                     # Codec: mp4v, XVID, avc1
  reconnect_delay_seconds: 10       # Segundos antes de reintentar conexión
  max_reconnect_attempts: 0         # 0 = reintentar indefinidamente
  log_level: "INFO"                 # DEBUG, INFO, WARNING, ERROR
